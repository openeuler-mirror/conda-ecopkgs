name: scalapack
category: others
channel: conda-forge
description: ScaLAPACK is a library of high-performance linear algebra routines for parallel distributed memory machines. ScaLAPACK solves dense and banded linear systems, least squares problems, eigenvalue problems, and singular value problems.
license: BSD-3-Clause
homepage: http://www.netlib.org/scalapack/

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n scalapack
    conda activate scalapack
    ```

  - 安装软件包
    ```
    conda install scalapack
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: Reference-ScaLAPACK/scalapack
  version_prefix: v
  version_filter: rc
