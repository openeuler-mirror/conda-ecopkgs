name: folly
category: others
channel: conda-forge
description: Folly is a library of C++14 components designed with practicality and efficiency in mind.
license: Apache-2.0
homepage: https://github.com/facebook/folly

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n folly
    conda activate folly
    ```

  - 安装软件包
    ```
    conda install folly
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: facebook/folly
  version_prefix: v
  version_filter: rc
