name: prodigal
category: hpc
channel: bioconda
description: Prodigal (Prokaryotic Dynamic Programming Genefinding Algorithm) is a microbial gene finding program for bacteria and archaea.
license: GPL-3.0-only
homepage: https://github.com/hyattpd/Prodigal

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels bioconda
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n prodigal
    conda activate prodigal
    ```

  - 安装软件包
    ```
    conda install prodigal
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: hyattpd/Prodigal
  version_prefix: v
  version_filter: rc
