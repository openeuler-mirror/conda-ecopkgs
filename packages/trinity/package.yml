name: trinity
category: hpc
channel: bioconda
description: Trinity assembles transcript sequences from Illumina RNA-Seq data.
license: BSD-3-Clause
homepage: https://github.com/trinityrnaseq/trinityrnaseq

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels bioconda
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n trinity
    conda activate trinity
    ```

  - 安装软件包
    ```
    conda install trinity
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: trinityrnaseq/trinityrnaseq
  version_prefix: Trinity-v
  version_filter: rc
