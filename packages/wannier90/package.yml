name: wannier90
category: others
channel: conda-forge
description: Wannier90 is an open-source code for generating maximally-localized Wannier functions.
license: GPL-2.0-only
homepage: http://www.wannier.org/

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n wannier90
    conda activate wannier90
    ```

  - 安装软件包
    ```
    conda install wannier90
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: wannier-developers/wannier90
  version_prefix: v
  version_filter: rc
