name: psipred
category: hpc
channel: bioconda
description: Protein Secondary Structure Predictor using feed-forward neural networks to analyze PSI-BLAST output.
license: Other
homepage: https://bioinf.cs.ucl.ac.uk/psipred

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels bioconda
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n psipred
    conda activate psipred
    ```

  - 安装软件包
    ```
    conda install psipred
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: psipred/psipred
  version_prefix: v
  version_filter: rc
