name: chromium
category: others
channel: esss
description: Chromium web browser
license: BSD-3-Clause
homepage: https://www.chromium.org/

maintainer: zhihang
maintainer-email: zhihang161013@outlook.com

usage: |

  - 添加Channel
    ```
    conda config --add channels esss
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n chromium
    conda activate chromium
    ```
    
  - 安装软件包
    ```
    conda install chromium
    ```

dependency-channels:
  - esss
