name: abyss
category: hpc
channel: bioconda
description: Assembly By Short Sequences - a de novo, parallel, paired-end short read sequence assembler.
license: GPL-3.0-only
homepage: https://www.bcgsc.ca/platform/bioinfo/software/abyss

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels bioconda
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n abyss
    conda activate abyss
    ```

  - 安装软件包
    ```
    conda install abyss
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: bcgsc/abyss
  version_prefix: v
  version_filter: rc
