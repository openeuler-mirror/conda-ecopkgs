name: libwebp
category: others
channel: conda-forge
description: WebP is a method of lossy and lossless compression that can be used on a large variety of photographic, translucent and graphical images found on the web.
license: BSD-3-Clause
homepage: https://developers.google.com/speed/webp

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n libwebp
    conda activate libwebp
    ```

  - 安装软件包
    ```
    conda install libwebp
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: webmproject/libwebp
  version_prefix: v
  version_filter: rc
