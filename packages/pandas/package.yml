name: pandas
category: others
channel: conda-forge
description: High-performance, easy-to-use data structures and data analysis tools for Python.
license: BSD-3-Clause
homepage: https://pandas.pydata.org

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n pandas
    conda activate pandas
    ```

  - 安装软件包
    ```
    conda install pandas
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: pandas-dev/pandas
  version_prefix: v
  version_filter: rc
