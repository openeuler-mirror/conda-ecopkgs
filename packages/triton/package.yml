name: triton
category: others
channel: conda-forge
description: Triton is a language and compiler for parallel programming. It aims to provide a Python-based programming environment for productively writing custom DNN compute kernels capable of running at maximal throughput on modern GPU hardware.
license: MIT
homepage: https://triton-lang.org/

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n triton
    conda activate triton
    ```

  - 安装软件包
    ```
    conda install triton
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: triton-lang/triton
  version_prefix: v
  version_filter: rc
