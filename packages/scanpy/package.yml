name: scanpy
category: hpc
channel: conda-forge
description: Scanpy is a scalable toolkit for analyzing single-cell gene expression data built jointly with anndata.
license: BSD-3-Clause
homepage: https://scverse.org/

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n scanpy
    conda activate scanpy
    ```

  - 安装软件包
    ```
    conda install scanpy
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: scverse/scanpy
  version_filter: rc
