name: vllm
category: hpc
channel: conda-forge
description: A high-throughput and memory-efficient inference and serving engine for LLMs.
license: Apache-2.0
homepage: https://docs.vllm.ai

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n vllm
    conda activate vllm
    ```

  - 安装软件包
    ```
    conda install vllm
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: vllm-project/vllm
  version_prefix: v
  version_filter: rc
