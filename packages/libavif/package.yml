name: libavif
category: others
channel: conda-forge
description: A friendly, portable C implementation of the AV1 Image File Format.
license: BSD-2-Clause
homepage: https://aomediacodec.github.io/av1-avif

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n libavif
    conda activate libavif
    ```

  - 安装软件包
    ```
    conda install libavif
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: AOMediaCodec/libavif
  version_prefix: v
  version_filter: rc
