name: espresso
category: hpc
channel: bioconda
description: ESPRESSO processes long read RNA-seq data to identify and quantify splice variants.
license: BSD-3-Clause
homepage: https://github.com/Xinglab/espresso

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels bioconda
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n espresso
    conda activate espresso
    ```

  - 安装软件包
    ```
    conda install espresso
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: Xinglab/espresso
  version_prefix: v
  version_filter: rc
