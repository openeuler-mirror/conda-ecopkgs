name: gemma
category: hpc
channel: bioconda
description: Linear mixed models (LMMs) for genome-wide association (GWA) studies.
license: GPL-3.0-only
homepage: https://github.com/genetics-statistics/GEMMA

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels bioconda
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n gemma
    conda activate gemma
    ```

  - 安装软件包
    ```
    conda install gemma
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: genetics-statistics/GEMMA
  version_prefix: v
  version_filter: rc
