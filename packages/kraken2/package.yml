name: kraken2
category: hpc
channel: bioconda
description: Kraken2 is a system for assigning taxonomic labels to short DNA sequences obtained through metagenomic studies.
license: GPL-3.0-or-later
homepage: https://ccb.jhu.edu/software/kraken2

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels bioconda
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n kraken2
    conda activate kraken2
    ```

  - 安装软件包
    ```
    conda install kraken2
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: DerrickWood/kraken2
  version_prefix: v
  version_filter: rc
