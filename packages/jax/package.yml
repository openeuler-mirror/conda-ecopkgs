name: jax
category: hpc
channel: conda-forge
description: Differentiate, compile, and transform Numpy code for high-performance numerical computing.
license: Apache-2.0
homepage: https://jax.readthedocs.io/

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n jax
    conda activate jax
    ```

  - 安装软件包
    ```
    conda install jax
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: jax-ml/jax
  version_prefix: jax-v
  version_filter: rc;test-;workflow
