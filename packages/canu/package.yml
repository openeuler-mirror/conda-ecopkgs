name: canu
category: hpc
channel: bioconda
description: Canu is a fork of the Celera Assembler designed for high-noise single-molecule sequencing.
license: GPL-2.0-or-later
homepage: https://github.com/marbl/canu

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels bioconda
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n canu
    conda activate canu
    ```

  - 安装软件包
    ```
    conda install canu
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: marbl/canu
  version_prefix: v
  version_filter: rc;development
