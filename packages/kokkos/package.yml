name: kokkos
category: others
channel: conda-forge
description: Kokkos implements a programming model in C++ for writing performance-portable applications targeting all major HPC platforms. It provides abstractions for both parallel execution of code and data management. Kokkos is designed to target complex node architectures with N-level memory hierarchies and multiple types of execution resources.
license: BSD-3-Clause
homepage: https://kokkos.org/

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n kokkos
    conda activate kokkos
    ```

  - 安装软件包
    ```
    conda install kokkos
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: kokkos/kokkos
  version_filter: rc
