name: gulp
category: others
channel: conda-forge
description: The streaming build system for Node.js.
license: MIT
homepage: https://gulpjs.com/

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n gulp
    conda activate gulp
    ```

  - 安装软件包
    ```
    conda install gulp
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: gulpjs/gulp
  version_prefix: v
  version_filter: rc
