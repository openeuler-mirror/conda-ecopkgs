name: protobuf
category: others
channel: conda-forge
description: Protocol buffers are Google's language-neutral, platform-neutral, extensible mechanism for serializing structured data.
license: BSD-3-Clause
homepage: https://developers.google.com/protocol-buffers

maintainer: zhangxinyuehfad
maintainer-email: starmoon_zhang@163.com

usage: |

  - 添加Channel
    ```
    conda config --add channels conda-forge
    ```

  - 创建隔离环境(可选)
    ```
    conda create -n protobuf
    conda activate protobuf
    ```

  - 安装软件包
    ```
    conda install protobuf
    ```

dependency-channels:
  - conda-forge

upstream:
  backend: GitHub
  version_scheme: RPM
  version_url: protocolbuffers/protobuf
  version_prefix: v
  version_filter: rc
